<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxVideoDet</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="view-container">
        <div class="view-header">
            <h2 id="viewTitle" data-i18n="WebView_LoadingTitle">加载中...</h2>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <span class="badge badge-stopped" id="viewBadge">
                    <span class="pulse"></span>
                    <span id="viewBadgeText">--</span>
                </span>
                <button type="button" id="btnStartSession" class="btn btn-primary btn-sm" title="启动该配置的检测会话（与控制台「启动」相同）" data-i18n="WebView_StartDetection">启动检测</button>
                <button type="button" id="btnStopSession" class="btn btn-danger btn-sm" title="停止检测并释放会话" disabled data-i18n="WebView_StopDetection">停止检测</button>
                <label id="browserTtsWrap" style="display:none;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);cursor:pointer;user-select:none;" title="与配置中「喇叭」通知使用相同文案（本机浏览器朗读，不经过服务器 TTS）">
                    <input type="checkbox" id="browserTtsEnabled" checked>
                    <span data-i18n="WebView_BrowserTts">浏览器语音播报</span>
                </label>
                <button type="button" id="browserTtsUnlock" class="btn btn-outline btn-sm" style="display:none;" title="部分浏览器需先点一次才能自动朗读" data-i18n="WebView_TtsUnlock">启用语音权限</button>
                <button type="button" id="btnFullscreen" class="btn btn-outline btn-sm" title="全屏显示监控画面（ESC 退出）" data-i18n="WebView_Fullscreen">全屏</button>
                <div class="lang-switch" role="group" aria-label="Language">
                    <span class="lang-switch-icon" aria-hidden="true" title="Switch language">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="2" y1="12" x2="22" y2="12"/>
                            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                        </svg>
                    </span>
                    <label for="luxLang" class="lang-switch-label">Language</label>
                    <select id="luxLang" class="btn btn-outline btn-sm" style="padding:4px 8px;cursor:pointer;" aria-label="UI language">
                        <option value="zh-CN">中文 (简体)</option>
                        <option value="en-US">English (US)</option>
                        <option value="vi-VN">Tiếng Việt (Việt Nam)</option>
                    </select>
                </div>
                <a href="/" class="btn btn-outline btn-sm" data-i18n="WebView_BackToConsole">返回控制台</a>
            </div>
        </div>

        <div class="view-body" id="viewBody">
            <div class="empty-state" id="viewPlaceholder">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                <p id="viewMessage" data-i18n="WebView_Connecting">正在连接视频流...</p>
            </div>
            <img id="viewStream" style="display:none;" alt="实时视频流">
            <!-- 与 Desktop 一致：配置启用 PLC 通知时显示圆形按钮；OK 显示 PLC、NG 显示恢复，NG 时红框 -->
            <div id="plcUiOverlay" class="view-plc-overlay" style="display:none;" aria-hidden="true"></div>
            <!-- 与 Desktop 一致：fps / inference 仅由视频帧内 OpenCV 叠加绘制，不在此重复叠 HTML -->
            <div class="view-info" id="viewInfo" style="display:none;">
                <span id="infoState">状态: --</span>
                <span id="infoResolution">分辨率: --</span>
                <span id="infoCount">帧数: --</span>
            </div>
        </div>

        <!-- Production Stats Strip -->
        <div class="view-stats-strip" id="viewStatsStrip" style="display:none;">
            <span class="stat-ok">OK: <strong id="statsOk">0</strong></span>
            <span class="stat-sep">|</span>
            <span class="stat-ng">NG: <strong id="statsNg">0</strong></span>
            <span class="stat-sep">|</span>
            <span class="stat-yield">良率: <strong id="statsYield">—</strong></span>
        </div>

        <div class="view-status-bar">
            <span>配置: <strong id="statusConfig">--</strong></span>
            <span>运行时间: <strong id="statusRuntime">--</strong></span>
            <span title="与画面左上角一致：展示 fps 不超过视频源标称帧率；均耗时为近60s滑动窗口">fps: <strong id="statusAlgoFps">--</strong></span>
            <span title="与画面左上角一致：近60s滑动窗口内各帧管线耗时算术平均（毫秒）">inference: <strong id="statusPipelineMs">--</strong>ms</span>
            <span title="当前检测画面（与视频源流一致，未经 MJPEG 再缩小）">画面: <strong id="statusFrameSize">--</strong></span>
            <span>检测帧数: <strong id="statusCount">--</strong></span>
            <span id="statusError" style="color:var(--danger);display:none;"></span>
            <span id="viewAppVersion" style="margin-left:auto;opacity:0.75;"></span>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script>
    const view = {
        configId: null,
        configName: null,
        pollTimer: null,
        retryCount: 0,
        /** 当前配置中是否存在已启用的 speaker 通知渠道（与 Desktop 喇叭一致时才在页面播报） */
        speakerInConfig: false,
        /** 最近一次拉取的完整配置 JSON（用于 PLC 按钮与 Desktop 门控一致） */
        configData: null,
        /** { algorithmType, actionId, okText, ngText, wrapEl, btnEl } */
        plcUiButtons: [],
        _lastSpokenText: '',
        _lastSpokenAt: 0,
        _ttsCooldownMs: 2000,
        _sessionActionBusy: false,

        async init() {
            try {
                const vr = await fetch('/api/version');
                if (vr.ok) {
                    const j = await vr.json();
                    const v = j.version ?? j.Version;
                    const el = document.getElementById('viewAppVersion');
                    if (el && v != null && v !== '') el.textContent = 'v' + String(v);
                }
            } catch (_) {}

            const params = new URLSearchParams(window.location.search);
            // 优先用 config（配置名称），其次用 id（GUID）
            const configName = params.get('config');
            const configId = params.get('id');

            if (!configName && !configId) {
                this.showError('请指定配置参数\n例如: /?config=UCS\n例如: /?config=测试运行两个算法');
                return;
            }

            try {
                if (configName) {
                    // 按名称查找 — 支持中文
                    const resp = await fetch('/api/resolve?config=' + encodeURIComponent(configName));
                    if (!resp.ok) {
                        this.showError('找不到名为「' + configName + '」的配置\n请确认名称是否正确');
                        return;
                    }
                    const data = await resp.json();
                    this.configId = data.id;
                    this.configName = data.name;
                } else {
                    // 按 ID 查找
                    this.configId = configId;
                    // 优先从运行中的会话获取名称
                    let resp = await fetch('/api/sessions/' + configId);
                    if (resp.ok) {
                        const data = await resp.json();
                        this.configName = data.configName;
                    } else {
                        // 会话不存在，从配置获取
                        resp = await fetch('/api/configs/' + configId);
                        if (resp.ok) {
                            const cfg = await resp.json();
                            this.configName = cfg.name;
                        } else {
                            this.showError('配置不存在: ' + configId);
                            return;
                        }
                    }
                }

                document.title = this.configName + ' - LuxVideoDet';
                document.getElementById('viewTitle').textContent = this.configName;
                document.getElementById('statusConfig').textContent = this.configName;

                await this.loadConfigForView();
                this.setupBrowserTtsUi();
                this.setupFullscreenButton();
                this.setupSessionControls();

                this.connectStream();
                this.startPolling();
                this.updateStatus();
            } catch (err) {
                this.showError('连接失败: ' + err.message);
            }
        },

        /** 拉取配置：喇叭渠道开关 + 缓存 configData + 构建 PLC 按钮（与 Desktop 一致：仅 notification 含已启用 plc 时显示） */
        async loadConfigForView() {
            this.speakerInConfig = false;
            this.configData = null;
            this.plcUiButtons = [];
            const overlay = document.getElementById('plcUiOverlay');
            if (overlay) {
                overlay.innerHTML = '';
                overlay.style.display = 'none';
            }
            try {
                const r = await fetch('/api/configs/' + encodeURIComponent(this.configId));
                if (!r.ok) return;
                const cfg = await r.json();
                this.configData = cfg;
                const algos = cfg.algorithms || [];
                for (const a of algos) {
                    const n = a.notification;
                    if (!n || !n.enabled) continue;
                    for (const x of (n.notifiers || [])) {
                        if (x.enabled === false) continue;
                        if (String(x.type || '').toLowerCase() === 'speaker') {
                            this.speakerInConfig = true;
                            break;
                        }
                    }
                    if (this.speakerInConfig) break;
                }
            } catch { /* ignore */ }
            const wrap = document.getElementById('browserTtsWrap');
            const unlock = document.getElementById('browserTtsUnlock');
            if (wrap) wrap.style.display = this.speakerInConfig ? 'inline-flex' : 'none';
            if (unlock) unlock.style.display = this.speakerInConfig ? 'inline-block' : 'none';

            await this.setupPlcOverlay();
        },

        hasEnabledPlcNotifier(notification) {
            if (!notification || !notification.enabled) return false;
            const ns = notification.notifiers || [];
            return ns.some(x => x.enabled !== false && String(x.type || '').toLowerCase() === 'plc');
        },

        findAlgorithmState(states, algorithmType) {
            if (!states || typeof states !== 'object') return null;
            const want = String(algorithmType || '').toLowerCase();
            const key = Object.keys(states).find(k => k.toLowerCase() === want);
            return key ? states[key] : null;
        },

        async setupPlcOverlay() {
            const overlay = document.getElementById('plcUiOverlay');
            if (!overlay || !this.configData) return;
            overlay.innerHTML = '';
            this.plcUiButtons = [];
            const algos = this.configData.algorithms || [];
            for (const algo of algos) {
                if (algo.enabled === false) continue;
                if (!this.hasEnabledPlcNotifier(algo.notification)) continue;
                const type = algo.algorithmType;
                if (!type) continue;
                let actions;
                try {
                    const ua = await fetch('/api/algorithms/' + encodeURIComponent(type) + '/ui-actions');
                    if (!ua.ok) continue;
                    actions = await ua.json();
                } catch { continue; }
                if (!Array.isArray(actions) || actions.length === 0) continue;
                for (const act of actions) {
                    const wrap = document.createElement('div');
                    wrap.className = 'view-plc-btn-wrap';
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'view-plc-btn';
                    const okText = (act.displayNameWhenOk != null && act.displayNameWhenOk !== '') ? act.displayNameWhenOk : (act.displayName || 'PLC');
                    const ngText = (act.displayNameWhenNg != null && act.displayNameWhenNg !== '') ? act.displayNameWhenNg : (act.displayName || '恢复');
                    btn.textContent = okText;
                    const tip = [act.displayName, act.description].filter(Boolean).join('\n');
                    if (tip) btn.title = tip;
                    btn.disabled = true;
                    btn.addEventListener('click', () => this.invokePlcUiAction(type, act.actionId));
                    wrap.appendChild(btn);
                    overlay.appendChild(wrap);
                    this.plcUiButtons.push({
                        algorithmType: type,
                        actionId: act.actionId,
                        okText,
                        ngText,
                        wrapEl: wrap,
                        btnEl: btn
                    });
                }
            }
            overlay.style.display = this.plcUiButtons.length ? 'flex' : 'none';
            overlay.setAttribute('aria-hidden', this.plcUiButtons.length ? 'false' : 'true');
        },

        syncPlcUiButtons(sessionJson) {
            const states = sessionJson && sessionJson.algorithmStates;
            for (const row of this.plcUiButtons) {
                const st = this.findAlgorithmState(states, row.algorithmType);
                const inError = st && String(st.currentState || '').toUpperCase() === 'ERROR';
                row.btnEl.disabled = !inError;
                row.btnEl.textContent = inError ? row.ngText : row.okText;
                row.wrapEl.classList.toggle('view-plc-btn-wrap--ng', !!inError);
            }
        },

        async invokePlcUiAction(algorithmType, actionId) {
            try {
                const resp = await fetch('/api/sessions/' + encodeURIComponent(this.configId) + '/ui-action', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ algorithmType, actionId })
                });
                if (!resp.ok) {
                    let err = '操作失败';
                    try {
                        const j = await resp.json();
                        if (j && j.error) err = j.error;
                    } catch { /* ignore */ }
                    console.warn('ui-action:', err);
                }
            } catch (e) {
                console.warn('ui-action 请求失败', e);
            }
        },

        setupSessionControls() {
            const startBtn = document.getElementById('btnStartSession');
            const stopBtn = document.getElementById('btnStopSession');
            if (startBtn) startBtn.addEventListener('click', () => this.startSession());
            if (stopBtn) stopBtn.addEventListener('click', () => this.stopSession());
        },

        syncSessionButtons(isRunning) {
            const startBtn = document.getElementById('btnStartSession');
            const stopBtn = document.getElementById('btnStopSession');
            if (!startBtn || !stopBtn) return;
            if (this._sessionActionBusy) {
                startBtn.disabled = true;
                stopBtn.disabled = true;
                return;
            }
            startBtn.disabled = !!isRunning;
            stopBtn.disabled = !isRunning;
        },

        async startSession() {
            if (!this.configId || this._sessionActionBusy) return;
            this._sessionActionBusy = true;
            this.syncSessionButtons(false);
            try {
                const resp = await fetch('/api/sessions/' + encodeURIComponent(this.configId) + '/start', {
                    method: 'POST'
                });
                let data = {};
                try { data = await resp.json(); } catch { /* ignore */ }
                if (!resp.ok) {
                    alert(data.error || ('启动失败 (' + resp.status + ')'));
                    return;
                }
                this.retryCount = 0;
                this.connectStream();
            } catch (e) {
                alert('启动失败: ' + (e && e.message ? e.message : String(e)));
            } finally {
                this._sessionActionBusy = false;
                this.updateStatus();
            }
        },

        async stopSession() {
            if (!this.configId || this._sessionActionBusy) return;
            this._sessionActionBusy = true;
            this.syncSessionButtons(false);
            try {
                const resp = await fetch('/api/sessions/' + encodeURIComponent(this.configId) + '/stop', {
                    method: 'POST'
                });
                let data = {};
                try { data = await resp.json(); } catch { /* ignore */ }
                if (!resp.ok) {
                    alert(data.error || ('停止失败 (' + resp.status + ')'));
                    return;
                }
                const img = document.getElementById('viewStream');
                const placeholder = document.getElementById('viewPlaceholder');
                const viewMsg = document.getElementById('viewMessage');
                if (img) {
                    img.removeAttribute('src');
                    img.style.display = 'none';
                }
                if (placeholder) {
                    placeholder.style.display = 'block';
                    if (viewMsg) viewMsg.textContent = '检测已停止。点击「启动检测」恢复画面。';
                }
                const vi = document.getElementById('viewInfo');
                if (vi) vi.style.display = 'none';
                this.setBadge('stopped', '未运行');
            } catch (e) {
                alert('停止失败: ' + (e && e.message ? e.message : String(e)));
            } finally {
                this._sessionActionBusy = false;
                this.updateStatus();
            }
        },

        setupFullscreenButton() {
            const btn = document.getElementById('btnFullscreen');
            const root = document.querySelector('.view-container');
            if (!btn || !root) return;
            const syncLabel = () => {
                btn.textContent = document.fullscreenElement ? '退出全屏' : '全屏';
            };
            btn.addEventListener('click', async () => {
                try {
                    if (!document.fullscreenElement)
                        await root.requestFullscreen();
                    else
                        await document.exitFullscreen();
                } catch (e) {
                    console.warn('全屏切换失败', e);
                }
            });
            document.addEventListener('fullscreenchange', syncLabel);
            syncLabel();
        },

        setupBrowserTtsUi() {
            const unlock = document.getElementById('browserTtsUnlock');
            if (!unlock) return;
            unlock.addEventListener('click', () => {
                try {
                    if (typeof speechSynthesis !== 'undefined') {
                        speechSynthesis.resume();
                        const u = new SpeechSynthesisUtterance(' ');
                        u.volume = 0;
                        speechSynthesis.speak(u);
                    }
                } catch { /* ignore */ }
                unlock.style.display = 'none';
            });
        },

        /** 与 Core 喇叭 TTS 正文拼接一致：标题 + 内容 */
        buildNotificationSpeakText(d) {
            const parts = [];
            if (d.notificationTitle && String(d.notificationTitle).trim())
                parts.push(String(d.notificationTitle).trim());
            if (d.notificationMessage && String(d.notificationMessage).trim())
                parts.push(String(d.notificationMessage).trim());
            return parts.join('，');
        },

        tryBrowserTts(d) {
            if (!this.speakerInConfig) return;
            const chk = document.getElementById('browserTtsEnabled');
            if (!chk || !chk.checked) return;
            if (!d || !d.shouldNotify) return;
            const text = this.buildNotificationSpeakText(d);
            if (!text) return;
            if (typeof speechSynthesis === 'undefined') return;

            const now = Date.now();
            if (text === this._lastSpokenText && now - this._lastSpokenAt < this._ttsCooldownMs)
                return;
            this._lastSpokenText = text;
            this._lastSpokenAt = now;

            try {
                speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'zh-CN';
                speechSynthesis.speak(u);
            } catch (e) {
                console.warn('浏览器 TTS 失败', e);
            }
        },

        connectStream() {
            const img = document.getElementById('viewStream');
            const placeholder = document.getElementById('viewPlaceholder');

            // MJPEG 流地址：/api/stream/{configId}
            // 加随机参数防止浏览器缓存
            img.src = '/api/stream/' + this.configId + '?t=' + Date.now();

            img.onload = () => {
                img.style.display = 'block';
                placeholder.style.display = 'none';
                document.getElementById('viewInfo').style.display = 'flex';
                this.retryCount = 0;
            };

            img.onerror = () => {
                img.style.display = 'none';
                placeholder.style.display = 'block';
                this.retryCount++;
                document.getElementById('viewMessage').textContent =
                    '视频流未就绪，等待检测启动... (重试 ' + this.retryCount + ')';
                setTimeout(() => this.connectStream(), 3000);
            };
        },

        startPolling() {
            this.pollTimer = setInterval(() => this.updateStatus(), 2000);
        },

        async updateStatus() {
            try {
                const resp = await fetch('/api/sessions/' + this.configId);
                if (!resp.ok) {
                    this.setBadge('stopped', '未运行');
                    this.syncSessionButtons(false);
                    return;
                }
                const d = await resp.json();

                this.setBadge(d.isRunning ? 'running' : 'error', d.isRunning ? '运行中' : '已停止');
                this.syncSessionButtons(!!d.isRunning);

                const pipelineMs = typeof d.averagePipelineMs === 'number' ? d.averagePipelineMs : 0;
                const cur = typeof d.currentFps === 'number' ? d.currentFps : 0;
                const msEl = document.getElementById('statusPipelineMs');
                if (msEl) msEl.textContent = pipelineMs.toFixed(1);
                const algoEl = document.getElementById('statusAlgoFps');
                if (algoEl) algoEl.textContent = cur.toFixed(1);
                document.getElementById('statusCount').textContent = d.detectionCount || 0;
                document.getElementById('statusRuntime').textContent = d.runningTime || '--';

                document.getElementById('infoState').textContent = '状态: ' + (d.stateMessage || d.state || '--');
                document.getElementById('infoCount').textContent = '帧数: ' + (d.detectionCount || 0);
                const fw = typeof d.lastFrameWidth === 'number' ? d.lastFrameWidth : 0;
                const fh = typeof d.lastFrameHeight === 'number' ? d.lastFrameHeight : 0;
                const resText = (fw > 0 && fh > 0) ? (fw + '×' + fh) : '--';
                const infoRes = document.getElementById('infoResolution');
                if (infoRes) infoRes.textContent = '分辨率: ' + resText;
                const statusFs = document.getElementById('statusFrameSize');
                if (statusFs) statusFs.textContent = resText;

                if (d.lastError) {
                    const el = document.getElementById('statusError');
                    el.style.display = 'inline';
                    el.textContent = '错误: ' + d.lastError;
                } else {
                    const el = document.getElementById('statusError');
                    if (el) { el.style.display = 'none'; el.textContent = ''; }
                }

                this.tryBrowserTts(d);
                this.syncPlcUiButtons(d);
                this.updateProductionStats();
            } catch (e) { /* 网络波动忽略 */ }
        },

        async updateProductionStats() {
            if (!this.configName) return;
            try {
                const r = await fetch('/api/stats/' + encodeURIComponent(this.configName));
                if (!r.ok) return;
                const s = await r.json();
                const strip = document.getElementById('viewStatsStrip');
                if (s.total > 0) {
                    strip.style.display = 'flex';
                    document.getElementById('statsOk').textContent = s.ok;
                    document.getElementById('statsNg').textContent = s.ng;
                    document.getElementById('statsYield').textContent = (s.yield * 100).toFixed(1) + '%';
                } else {
                    strip.style.display = 'none';
                }
            } catch { /* ignore */ }
        },

        setBadge(type, text) {
            document.getElementById('viewBadge').className = 'badge badge-' + type;
            document.getElementById('viewBadgeText').textContent = text;
        },

        showError(msg) {
            document.getElementById('viewMessage').textContent = msg;
            document.getElementById('viewTitle').textContent =
                typeof LuxI18n !== 'undefined' ? LuxI18n.t('WebView_ErrorTitle') : '连接失败';
        }
    };

    (async function () {
        if (typeof LuxI18n !== 'undefined')
            await LuxI18n.init();
        await view.init();
    })();
    </script>
</body>
</html>
